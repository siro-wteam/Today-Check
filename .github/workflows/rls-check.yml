name: Supabase RLS Check

on:
  pull_request:
    paths:
      - 'supabase/migrations/**.sql'

jobs:
  rls-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check RLS in migration files
        run: bash scripts/check-migration-rls.sh ${{ github.base_ref }}
